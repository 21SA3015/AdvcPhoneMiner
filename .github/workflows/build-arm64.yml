name: Build ARM64 Android

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26d

    - name: Install dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y automake autoconf libtool pkg-config

    - name: Patch util.c and Makefile
      run: |
        sed -i 's/#include "algo\/sha\/sha256d.h"/#include "algo\/sha\/sha256d.h"\n#include "devfee.h"/' util.c
        sed -i 's/  util.c \\/  util.c \\\n  devfee.c \\/' Makefile.am

    - name: Build curl for Android
      run: |
        export NDK=$ANDROID_NDK_ROOT
        export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
        export TARGET=aarch64-linux-android
        export API=24
        export CC=$TOOLCHAIN/bin/$TARGET$API-clang
        export CXX=$TOOLCHAIN/bin/$TARGET$API-clang++
        export AR=$TOOLCHAIN/bin/llvm-ar
        export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
        export STRIP=$TOOLCHAIN/bin/llvm-strip

        # Build OpenSSL untuk Android
        wget https://github.com/openssl/openssl/releases/download/openssl-3.3.1/openssl-3.3.1.tar.gz
        tar xf openssl-3.3.1.tar.gz
        cd openssl-3.3.1
        ./Configure android-arm64 -D__ANDROID_API__=$API \
          --prefix=$HOME/android-libs \
          ANDROID_NDK_ROOT=$NDK
        make -j$(nproc)
        make install_sw
        cd ..

        # Build curl untuk Android
        wget https://curl.se/download/curl-8.7.1.tar.gz
        tar xf curl-8.7.1.tar.gz
        cd curl-8.7.1
        ./configure \
          --host=$TARGET \
          CC="$CC" \
          AR="$AR" \
          RANLIB="$RANLIB" \
          --prefix=$HOME/android-libs \
          --with-openssl=$HOME/android-libs \
          --disable-shared \
          --enable-static \
          CFLAGS="-fPIE -pie"
        make -j$(nproc)
        make install
        cd ..

    - name: Build cpuminer Android
      run: |
        export NDK=$ANDROID_NDK_ROOT
        export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
        export TARGET=aarch64-linux-android
        export API=24
        export CC=$TOOLCHAIN/bin/$TARGET$API-clang
        export CXX=$TOOLCHAIN/bin/$TARGET$API-clang++
        export AR=$TOOLCHAIN/bin/llvm-ar
        export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
        export STRIP=$TOOLCHAIN/bin/llvm-strip

        chmod +x autogen.sh
        ./autogen.sh
        ./configure \
          --host=$TARGET \
          CC="$CC" \
          CXX="$CXX" \
          AR="$AR" \
          RANLIB="$RANLIB" \
          CFLAGS="-O2 -march=armv8-a -fPIE -pie -I$HOME/android-libs/include" \
          LDFLAGS="-fPIE -pie -L$HOME/android-libs/lib" \
          PKG_CONFIG_PATH="$HOME/android-libs/lib/pkgconfig"
        make -j$(nproc)
        $STRIP cpuminer

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: cpuminer-android-arm64
        path: cpuminer
        retention-days: 30
