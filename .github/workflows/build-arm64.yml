name: Build ARM64 Android

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26d

    - name: Install dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y automake autoconf libtool pkg-config

    - name: Patch util.c and Makefile
      run: |
        sed -i 's/#include "algo\/sha\/sha256d.h"/#include "algo\/sha\/sha256d.h"\n#include "devfee.h"/' util.c
        sed -i 's/  util.c \\/  util.c \\\n  devfee.c \\/' Makefile.am

    - name: Build deps and cpuminer
      run: |
        export NDK=$ANDROID_NDK_ROOT
        export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
        export TARGET=aarch64-linux-android
        export API=24
        export CC=$TOOLCHAIN/bin/${TARGET}${API}-clang
        export CXX=$TOOLCHAIN/bin/${TARGET}${API}-clang++
        export AR=$TOOLCHAIN/bin/llvm-ar
        export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
        export STRIP=$TOOLCHAIN/bin/llvm-strip
        export PATH=$TOOLCHAIN/bin:$PATH
        export LIBS_DIR=$HOME/android-libs

        echo "=== Verifikasi compiler ==="
        $CC --version

        # Build OpenSSL
        echo "=== Build OpenSSL ==="
        wget -q https://github.com/openssl/openssl/releases/download/openssl-3.3.1/openssl-3.3.1.tar.gz
        tar xf openssl-3.3.1.tar.gz
        cd openssl-3.3.1
        ./Configure android-arm64 \
          -D__ANDROID_API__=$API \
          --prefix=$LIBS_DIR \
          ANDROID_NDK_ROOT=$NDK \
          no-shared no-tests
        make -j$(nproc)
        make install_sw
        cd ..
        echo "OpenSSL done: $(ls $LIBS_DIR/lib/libssl.a 2>/dev/null || echo MISSING)"

        # Build curl
        echo "=== Build curl ==="
        wget -q https://curl.se/download/curl-8.7.1.tar.gz
        tar xf curl-8.7.1.tar.gz
        cd curl-8.7.1
        ./configure \
          --host=$TARGET \
          CC="$CC" \
          AR="$AR" \
          RANLIB="$RANLIB" \
          --prefix=$LIBS_DIR \
          --with-openssl=$LIBS_DIR \
          --disable-shared \
          --enable-static \
          --disable-manual \
          --without-libidn2 \
          --without-librtmp \
          --without-brotli \
          --without-zstd \
          CFLAGS="-fPIE -pie -I$LIBS_DIR/include" \
          LDFLAGS="-fPIE -pie -L$LIBS_DIR/lib"
        make -j$(nproc)
        make install
        cd ..
        echo "curl done: $(ls $LIBS_DIR/lib/libcurl.a 2>/dev/null || echo MISSING)"

        # Build GMP
        echo "=== Build GMP ==="
        wget -q https://gmplib.org/download/gmp/gmp-6.3.0.tar.xz
        tar xf gmp-6.3.0.tar.xz
        cd gmp-6.3.0
        ./configure \
          --host=$TARGET \
          CC="$CC" \
          AR="$AR" \
          RANLIB="$RANLIB" \
          --prefix=$LIBS_DIR \
          --disable-shared \
          --enable-static
        make -j$(nproc)
        make install
        cd ..
        echo "GMP done: $(ls $LIBS_DIR/lib/libgmp.a 2>/dev/null || echo MISSING)"

        # Build cpuminer
        echo "=== Build cpuminer ==="
        chmod +x autogen.sh
        ./autogen.sh
        ./configure \
          --host=$TARGET \
          CC="$CC" \
          CXX="$CXX" \
          AR="$AR" \
          RANLIB="$RANLIB" \
          CFLAGS="-O2 -fPIE -pie -I$LIBS_DIR/include -Wno-error -w" \
          LDFLAGS="-fPIE -pie -L$LIBS_DIR/lib -static" \
          LIBS="-lcurl -lssl -lcrypto -lgmp -lz -ldl" \
          PKG_CONFIG_PATH="$LIBS_DIR/lib/pkgconfig" \
          --disable-assembly \
          --without-asm \
          --disable-avx \
          --disable-avx2 \
          --disable-avx512
        make -j$(nproc) || make -j1
        echo "=== Cek hasil ==="
        ls -la cpuminer 2>/dev/null || echo "cpuminer NOT FOUND"
        $STRIP cpuminer 2>/dev/null || true
        file cpuminer 2>/dev/null || true

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: cpuminer-android-arm64
        path: cpuminer
        if-no-files-found: warn
        retention-days: 30
