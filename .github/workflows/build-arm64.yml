name: Build ARM64 Android

on:
  workflow_dispatch:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26d

    - name: Install dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y automake autoconf libtool pkg-config

    - name: Patch util.c and Makefile
      run: |
        sed -i 's/#include "algo\/sha\/sha256d.h"/#include "algo\/sha\/sha256d.h"\n#include "devfee.h"/' util.c
        sed -i 's/  util.c \\/  util.c \\\n  devfee.c \\/' Makefile.am

    - name: Build with Android NDK
      run: |
        export NDK=$ANDROID_NDK_ROOT
        export TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64
        export TARGET=aarch64-linux-android
        export API=24
        export CC=$TOOLCHAIN/bin/$TARGET$API-clang
        export CXX=$TOOLCHAIN/bin/$TARGET$API-clang++
        export AR=$TOOLCHAIN/bin/llvm-ar
        export RANLIB=$TOOLCHAIN/bin/llvm-ranlib
        export STRIP=$TOOLCHAIN/bin/llvm-strip
        chmod +x autogen.sh
        ./autogen.sh
        ./configure \
          --host=$TARGET \
          CC="$CC" \
          CXX="$CXX" \
          AR="$AR" \
          RANLIB="$RANLIB" \
          CFLAGS="-O2 -march=armv8-a -fPIE -pie" \
          LDFLAGS="-fPIE -pie" \
          --without-curl \
          --disable-assembly
        make -j$(nproc)
        $STRIP cpuminer

    - name: Upload binary
      uses: actions/upload-artifact@v4
      with:
        name: cpuminer-android-arm64
        path: cpuminer
        retention-days: 30
